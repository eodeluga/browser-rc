services:
  browser-rc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browser-rc
    environment:
      CHROME_PROFILE_DIRECTORY: ${CHROME_PROFILE_DIRECTORY:-Default}
      CHROME_USER_DATA_DIR: /data/chrome-profile
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 3022
      OUTPUT_BASE_DIR: /data/runs
    expose:
      - '3022'
    networks:
      - browser-rc-access
    ports:
      - "${STAGEHAND_PORT:-3022}:3022"
    restart: unless-stopped
    shm_size: 1gb
    stdin_open: true
    tty: true
    volumes:
      - ./data/docker/chrome-profile:/data/chrome-profile
      - ./data/docker/runs:/data/runs
  
  swagger:
    container_name: browser-rc-swagger
    image: swaggerapi/swagger-ui
    restart: unless-stopped
    networks:
      - browser-rc-access
    ports:
      - '8081:8080'
    volumes:
      - ./openapi/openapi.yaml:/openapi.yaml:ro
    environment:
      SWAGGER_JSON: /openapi.yaml
      DEFAULT_MODEL_RENDERING: model

networks:
  browser-rc-access:
    name: browser-rc-access
    driver: bridge
